[package]
name = "scenix"
description = "Facade crate for the scenix Scene Graph APIs."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
readme.workspace = true

[features]
default = ["std", "scene"]
std = ["scenix-math/std", "scenix-core/std", "scenix-input/std", "scenix-scene?/std"]
scene = ["dep:scenix-scene"]
libm = ["scenix-math/libm"]
serde = ["scenix-math/serde", "scenix-core/serde", "scenix-input/serde", "scenix-scene?/serde"]
approx = ["scenix-math/approx"]
gpu = ["scenix-core/gpu"]

[dependencies]
scenix-core = { workspace = true }
scenix-input = { workspace = true }
scenix-math = { workspace = true }
scenix-scene = { workspace = true, optional = true }

[[test]]
name = "scenix_foundation"
path = "../../tests/scenix_foundation.rs"
