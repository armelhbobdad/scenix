name: Publish

on:
  push:
    tags:
      - "v1.0.0"
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  verify:
    name: Pre-publish verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Mesa Vulkan software driver
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "v0.21.14"

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Test all features
        run: cargo test --workspace --all-features

      - name: Test no-default CPU crates
        run: cargo test -p scenix-math -p scenix-core -p scenix-input -p scenix-scene -p scenix-camera -p scenix-mesh -p scenix-material -p scenix-light -p scenix-texture -p scenix-raycaster -p scenix-helpers -p scenix-animato --no-default-features

      - name: Test loader all features
        run: cargo test -p scenix-loader --all-features

      - name: Test raycaster and helpers all features
        run: cargo test -p scenix-raycaster -p scenix-helpers --all-features

      - name: Test animato bridge all features
        run: cargo test -p scenix-animato --all-features

      - name: Check scenix-wasm
        run: cargo check -p scenix-wasm --target wasm32-unknown-unknown --all-features

      - name: Check wasm viewer example
        run: cargo check --manifest-path examples/wasm_viewer/Cargo.toml --target wasm32-unknown-unknown

      - name: Build website
        working-directory: website
        run: trunk build --release --public-url /scenix/

      - name: Test renderer and post GPU paths
        run: cargo test -p scenix-renderer -p scenix-post --all-features
        env:
          SCENIX_RUN_GPU_TESTS: "1"
          WGPU_BACKEND: vulkan

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Package crates
        run: |
          cargo package --workspace --no-verify

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          publish_crate() {
            crate="$1"
            log="publish-${crate}.log"

            cargo package -p "$crate" --no-verify

            for attempt in 1 2 3 4 5; do
              set +e
              cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN" 2>&1 | tee "$log"
              status="${PIPESTATUS[0]}"
              set -e

              if [ "$status" -eq 0 ]; then
                return 0
              fi

              if grep -Eiq "already uploaded|already exists|crate version .* is already uploaded" "$log"; then
                echo "$crate is already published for this version; continuing."
                return 0
              fi

              if grep -Eiq "failed to select a version|no matching package named|perhaps a crate was updated and forgotten" "$log" && [ "$attempt" -lt 5 ]; then
                echo "crates.io index has not caught up for $crate; retrying in 60 seconds."
                sleep 60
                continue
              fi

              echo "Publishing $crate failed." >&2
              exit "$status"
            done
          }

          for crate in \
            scenix-math \
            scenix-core \
            scenix-input \
            scenix-scene \
            scenix-camera \
            scenix-mesh \
            scenix-material \
            scenix-light \
            scenix-texture \
            scenix-loader \
            scenix-post \
            scenix-renderer \
            scenix-raycaster \
            scenix-helpers \
            scenix-animato \
            scenix-wasm \
            scenix
          do
            publish_crate "$crate"
            if [ "$crate" != "scenix" ]; then
              sleep 30
            fi
          done

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "scenix ${{ github.ref_name }}"
          body_path: docs/release-v1.0.0.md
